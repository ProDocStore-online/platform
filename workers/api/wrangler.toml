name = "freedocstore-api"
main = "src/index.ts"
compatibility_date = "2026-03-17"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[[routes]]
pattern = "api.freedocstore.online/*"
zone_name = "freedocstore.online"

[vars]
EDITOR_BASE_URL = "https://console.freedocstore.online"
PUBLIC_BASE_URL = "https://freedocstore.online"
COOKIE_DOMAIN = ""
GITHUB_ORG = "FreeDocStore"

# Required secrets:
# wrangler secret put GITHUB_CLIENT_ID
# wrangler secret put GITHUB_CLIENT_SECRET
# wrangler secret put GITHUB_TOKEN
# wrangler secret put GOOGLE_CLIENT_ID
# wrangler secret put GOOGLE_CLIENT_SECRET
# wrangler secret put FDS_KEY_ENCRYPTION_KEY
#
# OpenAI is BYOK only. Users save their own key in the FreeDocStore console;
# the API reads it from the encrypted per-user platform vault for AI generation.
#
# OAuth callbacks:
# https://api.freedocstore.online/auth/github/callback
# https://api.freedocstore.online/auth/google/callback

[[kv_namespaces]]
binding = "FDS_API_KV"
id = "7efa958454744e938ba2cf8e5439e71a"
