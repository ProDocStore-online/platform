name = "prodocstore-api"
main = "src/index.ts"
compatibility_date = "2026-03-17"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[[routes]]
pattern = "api.prodocstore.online/*"
zone_name = "prodocstore.online"

[vars]
EDITOR_BASE_URL = "https://console.prodocstore.online"
PUBLIC_BASE_URL = "https://prodocstore.online"
COOKIE_DOMAIN = ""
GITHUB_ORG = "ProDocStore-online"

# Required secrets:
# wrangler secret put GITHUB_CLIENT_ID
# wrangler secret put GITHUB_CLIENT_SECRET
# wrangler secret put GITHUB_TOKEN
# wrangler secret put GOOGLE_CLIENT_ID
# wrangler secret put GOOGLE_CLIENT_SECRET
# wrangler secret put PDS_KEY_ENCRYPTION_KEY
#
# OpenAI is BYOK only. Users save their own key in the ProDocStore console;
# the API reads it from the encrypted per-user platform vault for AI generation.
#
# OAuth callbacks:
# https://api.prodocstore.online/auth/github/callback
# https://api.prodocstore.online/auth/google/callback

[[kv_namespaces]]
binding = "PDS_API_KV"
id = "5872e9e5307d450985d985cb4a627a78"
