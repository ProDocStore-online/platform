name: Sync Cloudflare Access policies
description: |
  Idempotently syncs the managed Cloudflare Access policies on a given Access app:
    - "Office network bypass"   (decision: bypass, IP-based)   - optional
    - "Allow ProDocStore users" (decision: allow)
       includes optional email domains and explicit emails
                 + optional client domain
                 + optional explicit client emails

  All pre-existing policies on the app are deleted before recreation, so the
  live state always matches the inputs.

  Shell logic lives in templates/search/scripts/sync-access-policies.sh so it
  can be unit-tested locally.

inputs:
  app-id:
    description: Cloudflare Access application ID
    required: true
  cf-api-token:
    description: Cloudflare API token
    required: true
  cf-account-id:
    description: Cloudflare account ID
    required: true
  email-domain:
    description: Primary employee email domain
    required: false
    default: ""
  client-emails:
    description: Comma-separated client email addresses to allow
    required: false
    default: ""
  client-domain:
    description: Single client email domain to allow
    required: false
    default: ""
  office-cidrs:
    description: Comma-separated office CIDRs that bypass auth entirely
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Sync Access policies
      shell: bash
      env:
        CLOUDFLARE_API_TOKEN: ${{ inputs.cf-api-token }}
        CLOUDFLARE_ACCOUNT_ID: ${{ inputs.cf-account-id }}
        APP_ID: ${{ inputs.app-id }}
        EMAIL_DOMAIN: ${{ inputs.email-domain }}
        CLIENT_EMAILS: ${{ inputs.client-emails }}
        CLIENT_DOMAIN: ${{ inputs.client-domain }}
        OFFICE_CIDRS: ${{ inputs.office-cidrs }}
      run: |
        bash "${{ github.action_path }}/../../../templates/search/scripts/sync-access-policies.sh"
