name: Release extension

# Push a tag like v0.1.0 to publish: builds the extension, packages it
# into freedocstore-vX.Y.Z.zip, and creates a GitHub Release with that
# zip attached. Tag MUST match the version field in extension/manifest.json
# AND extension/package.json - the package script enforces both, and an
# extra check below catches tag/manifest drift before any work happens.
#
# CWS upload is intentionally manual for now (one-time auth setup +
# review queue). Once the extension is on the store, we can layer in
# `mnao/chrome-addon` or the chrome-webstore-upload-cli to finish the
# pipeline. For now: this workflow ships the canonical .zip; an
# operator downloads it from the Release and uploads to the dev console.

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write   # required for `gh release create`

jobs:
  release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extension
    steps:
      - uses: actions/checkout@v7
        with:
          # Need full history so generate-changelog test fixtures (used
          # in the test step below) can walk git logs in tmpdirs that
          # mirror the live repo.
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Validate tag matches manifest version
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/v}"
          MANIFEST_VER=$(node -p "require('./manifest.json').version")
          PKG_VER=$(node -p "require('./package.json').version")
          echo "tag=$TAG  manifest=$MANIFEST_VER  package=$PKG_VER"
          if [ "$TAG" != "$MANIFEST_VER" ]; then
            echo "::error::Tag v$TAG does not match manifest.json version $MANIFEST_VER. Bump manifest first."
            exit 1
          fi
          if [ "$TAG" != "$PKG_VER" ]; then
            echo "::error::Tag v$TAG does not match package.json version $PKG_VER. Bump package.json first."
            exit 1
          fi

      - name: Configure git identity (needed for generate-changelog fixtures)
        run: |
          git config --global user.email "ci@example.com"
          git config --global user.name "CI"
          git config --global commit.gpgsign false

      - name: Install
        run: npm ci --no-audit --no-fund || npm install --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck

      # Run the full test suite as a safety net before publishing -
      # nothing leaves the repo if tests fail.
      - name: Test
        run: npm test

      - name: Package
        run: npm run package

      - name: Confirm zip exists
        id: zip
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/v}"
          ZIP="dist-zip/freedocstore-v${TAG}.zip"
          if [ ! -f "$ZIP" ]; then
            echo "::error::Expected $ZIP after npm run package, file not found"
            exit 1
          fi
          echo "path=$ZIP" >> "$GITHUB_OUTPUT"
          ls -lh "$ZIP"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/v}"
          # --generate-notes builds release notes from merged PRs +
          # commits since the previous tag. --verify-tag refuses to
          # create a release if the tag doesn't actually exist on
          # remote (defensive against a partially-pushed tag).
          gh release create "v${TAG}" \
            "${{ steps.zip.outputs.path }}" \
            --title "v${TAG}" \
            --generate-notes \
            --verify-tag

      - name: Next steps reminder
        run: |
          cat <<'EOF'
          ────────────────────────────────────────────────────────────
            Release published. Manual follow-ups:

            1. Download freedocstore-v*.zip from the GitHub Release page.
            2. Upload to Chrome Web Store dev console:
               https://chrome.google.com/webstore/devconsole
            3. Submit for review (1-3 business days, longer on first
               review). Listing visibility: Unlisted.
            4. Once approved, replace the placeholder href="#" in
               docs/install.html with the real CWS URL.
          ────────────────────────────────────────────────────────────
          EOF
