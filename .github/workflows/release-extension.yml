name: Release extension

# Push a tag like v0.1.0 to publish: builds the extension, packages it
# into prodocstore-vX.Y.Z.zip, and creates a GitHub Release with that
# zip attached. Tag MUST match the version field in extension/manifest.json
# AND extension/package.json - the package script enforces both, and an
# extra check below catches tag/manifest drift before any work happens.
#
# Chrome Web Store upload is automatic when the CWS_* repository or
# organization secrets are configured. First-time store listing/privacy setup
# still happens in the Chrome Web Store Developer Dashboard.

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write   # required for `gh release create`

jobs:
  release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extension
    steps:
      - uses: actions/checkout@v7
        with:
          # Need full history so generate-changelog test fixtures (used
          # in the test step below) can walk git logs in tmpdirs that
          # mirror the live repo.
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Validate tag matches manifest version
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/v}"
          MANIFEST_VER=$(node -p "require('./manifest.json').version")
          PKG_VER=$(node -p "require('./package.json').version")
          echo "tag=$TAG  manifest=$MANIFEST_VER  package=$PKG_VER"
          if [ "$TAG" != "$MANIFEST_VER" ]; then
            echo "::error::Tag v$TAG does not match manifest.json version $MANIFEST_VER. Bump manifest first."
            exit 1
          fi
          if [ "$TAG" != "$PKG_VER" ]; then
            echo "::error::Tag v$TAG does not match package.json version $PKG_VER. Bump package.json first."
            exit 1
          fi

      - name: Configure git identity (needed for generate-changelog fixtures)
        run: |
          git config --global user.email "ci@example.com"
          git config --global user.name "CI"
          git config --global commit.gpgsign false

      - name: Install
        run: npm ci --no-audit --no-fund || npm install --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck

      # Run the full test suite as a safety net before publishing -
      # nothing leaves the repo if tests fail.
      - name: Test
        run: npm test

      - name: Package
        run: npm run package

      - name: Confirm zip exists
        id: zip
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/v}"
          ZIP="dist-zip/prodocstore-v${TAG}.zip"
          if [ ! -f "$ZIP" ]; then
            echo "::error::Expected $ZIP after npm run package, file not found"
            exit 1
          fi
          echo "path=$ZIP" >> "$GITHUB_OUTPUT"
          ls -lh "$ZIP"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/v}"
          # --generate-notes builds release notes from merged PRs +
          # commits since the previous tag. --verify-tag refuses to
          # create a release if the tag doesn't actually exist on
          # remote (defensive against a partially-pushed tag).
          gh release create "v${TAG}" \
            "${{ steps.zip.outputs.path }}" \
            --title "v${TAG}" \
            --generate-notes \
            --verify-tag

      - name: Check Chrome Web Store automation config
        id: cws
        env:
          CWS_CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
          CWS_CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
          CWS_REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
          CWS_PUBLISHER_ID: ${{ secrets.CWS_PUBLISHER_ID }}
          CWS_EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
        run: |
          set -euo pipefail
          if [ -n "${CWS_CLIENT_ID}" ] && \
             [ -n "${CWS_CLIENT_SECRET}" ] && \
             [ -n "${CWS_REFRESH_TOKEN}" ] && \
             [ -n "${CWS_PUBLISHER_ID}" ] && \
             [ -n "${CWS_EXTENSION_ID}" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to Chrome Web Store
        if: ${{ steps.cws.outputs.configured == 'true' }}
        env:
          CWS_CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
          CWS_CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
          CWS_REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
          CWS_PUBLISHER_ID: ${{ secrets.CWS_PUBLISHER_ID }}
          CWS_EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/v}"
          node scripts/publish-cws.mjs "dist-zip/prodocstore-v${TAG}.zip"

      - name: Chrome Web Store automation not configured
        if: ${{ steps.cws.outputs.configured != 'true' }}
        run: |
          echo "::notice::Chrome Web Store upload skipped. Add CWS_CLIENT_ID, CWS_CLIENT_SECRET, CWS_REFRESH_TOKEN, CWS_PUBLISHER_ID, and CWS_EXTENSION_ID to enable automatic submission."

      - name: Next steps reminder
        run: |
          cat <<'EOF'
          ────────────────────────────────────────────────────────────
            Release published.

            If CWS_* secrets are configured, the zip was uploaded to Chrome
            Web Store and submitted for review. If not, configure those
            secrets and rerun through a new version tag.

            After first approval, replace the placeholder href="#" in
            docs/install.html with the real CWS URL.
          ────────────────────────────────────────────────────────────
          EOF
