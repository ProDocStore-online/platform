name: Deploy Editor

on:
  push:
    branches: [main]
    paths:
      - 'apps/editor/**'
      - '.github/workflows/deploy-editor.yml'
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: deploy-editor
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/editor
    env:
      HAS_CLOUDFLARE_SECRETS: ${{ secrets.CLOUDFLARE_API_TOKEN != '' && secrets.CLOUDFLARE_ACCOUNT_ID != '' }}
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 10.30.3
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm build
      - name: Deploy to FreeDocStore Cloudflare Pages
        if: env.HAS_CLOUDFLARE_SECRETS == 'true'
        uses: cloudflare/wrangler-action@v3
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '3.91.0'
          command: pages deploy apps/editor/web/dist --project-name=freedocstore-editor
      - name: Cloudflare secrets missing
        if: env.HAS_CLOUDFLARE_SECRETS != 'true'
        run: echo "::notice::Editor deployment skipped. Add CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID as FreeDocStore organization Actions secrets."
