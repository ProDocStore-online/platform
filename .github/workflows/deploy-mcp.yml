name: Deploy MCP

on:
  push:
    branches: [main]
    paths:
      - 'workers/mcp/**'
      - '.github/workflows/deploy-mcp.yml'
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: deploy-mcp
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workers/mcp
    env:
      HAS_CLOUDFLARE_SECRETS: ${{ secrets.CLOUDFLARE_API_TOKEN != '' && secrets.CLOUDFLARE_ACCOUNT_ID != '' }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: workers/mcp/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - name: Deploy to Cloudflare Workers
        if: env.HAS_CLOUDFLARE_SECRETS == 'true'
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Verify MCP OAuth configuration
        if: env.HAS_CLOUDFLARE_SECRETS == 'true'
        run: |
          set -euo pipefail
          HEALTH="$(curl -fsS https://mcp.prodocstore.online/health)"
          echo "$HEALTH" | jq .
          if [ "$(echo "$HEALTH" | jq -r '.oauthConfigured')" != "true" ]; then
            echo "::error::ProDocStore MCP deployed, but GitHub OAuth is not configured. Set GITHUB_CLIENT_ID and GITHUB_CLIENT_SECRET as Wrangler secrets on prodocstore-mcp."
            exit 1
          fi
          if [ "$(echo "$HEALTH" | jq -r '.storageConfigured')" != "true" ]; then
            echo "::error::ProDocStore MCP deployed, but required storage bindings are not configured."
            exit 1
          fi
      - name: Cloudflare secrets missing
        if: env.HAS_CLOUDFLARE_SECRETS != 'true'
        run: echo "::notice::Cloudflare deployment skipped. Add CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID as ProDocStore organization Actions secrets."
