name: Apply DNS

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  apply:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      ZONE_NAME: prodocstore.online
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Upsert ProDocStore DNS records
        run: |
          node <<'NODE'
          const token = process.env.CLOUDFLARE_API_TOKEN;
          const zoneName = process.env.ZONE_NAME;
          if (!token) throw new Error("CLOUDFLARE_API_TOKEN is required");

          const headers = {
            Authorization: `Bearer ${token}`,
            "Content-Type": "application/json",
          };

          async function cf(path, init = {}) {
            const res = await fetch(`https://api.cloudflare.com/client/v4${path}`, {
              ...init,
              headers: { ...headers, ...(init.headers || {}) },
            });
            const data = await res.json().catch(() => ({}));
            if (!res.ok || data.success === false) {
              const msg = (data.errors || []).map((err) => `${err.code}: ${err.message}`).join("; ");
              throw new Error(`${init.method || "GET"} ${path} failed: ${res.status} ${msg}`);
            }
            return data;
          }

          const zones = await cf(`/zones?name=${encodeURIComponent(zoneName)}`);
          const zone = zones.result?.[0];
          if (!zone?.id) throw new Error(`Zone not found: ${zoneName}`);

          const records = [
            { type: "CNAME", name: "prodocstore.online", content: "prodocstore.pages.dev", proxied: true },
            { type: "CNAME", name: "www.prodocstore.online", content: "prodocstore.pages.dev", proxied: true },
            { type: "CNAME", name: "console.prodocstore.online", content: "prodocstore-editor.pages.dev", proxied: true },
            { type: "CNAME", name: "api.prodocstore.online", content: "prodocstore-api.serge-the-dev.workers.dev", proxied: true },
            { type: "CNAME", name: "mcp.prodocstore.online", content: "prodocstore-mcp.serge-the-dev.workers.dev", proxied: true },
          ];

          for (const record of records) {
            const existing = await cf(`/zones/${zone.id}/dns_records?type=${record.type}&name=${encodeURIComponent(record.name)}`);
            const current = existing.result?.[0];
            const body = { ...record, ttl: 1 };
            if (current?.id) {
              await cf(`/zones/${zone.id}/dns_records/${current.id}`, {
                method: "PUT",
                body: JSON.stringify(body),
              });
              console.log(`updated ${record.name}`);
            } else {
              await cf(`/zones/${zone.id}/dns_records`, {
                method: "POST",
                body: JSON.stringify(body),
              });
              console.log(`created ${record.name}`);
            }
          }
          NODE
